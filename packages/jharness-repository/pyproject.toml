[project]
name = "jharness-repository"
version = "0.2.2"
description = "Memory, SQLite, MySQL, and Redis checkpoint repositories for JHarness"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "JHarness contributors" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
]
dependencies = [
  "jharness-kernel==0.2.2",
]

[project.optional-dependencies]
mysql = ["pymysql[rsa]>=1.2.0"]
redis = ["redis>=8.0.1"]

[project.urls]
Documentation = "https://github.com/Ezio2000/jharness/tree/main/docs"
Repository = "https://github.com/Ezio2000/jharness.git"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jharness"]

[tool.hatch.build.targets.sdist]
include = ["src/jharness/repository", "LICENSE", "README.md", "pyproject.toml"]
