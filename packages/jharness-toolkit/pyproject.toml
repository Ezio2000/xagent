[project]
name = "jharness-toolkit"
version = "0.2.0"
description = "Tool registry and adaptation toolkit for JHarness"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "JHarness contributors" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
]
dependencies = [
  "jharness-kernel==0.2.0",
  "jsonschema>=4.23.0",
  "referencing>=0.35.0",
]

[project.urls]
Documentation = "https://github.com/Ezio2000/jharness/tree/main/docs"
Repository = "https://github.com/Ezio2000/jharness.git"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jharness"]

[tool.hatch.build.targets.sdist]
include = ["src/jharness/toolkit", "LICENSE", "README.md", "pyproject.toml"]
