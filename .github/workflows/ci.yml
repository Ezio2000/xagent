name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python SDK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        working-directory: sdks/python
        run: uv sync --locked

      - name: Smoke test package CLI
        working-directory: sdks/python
        run: |
          uv run --isolated --with . agent-runtime-conformance --help
          uv run --isolated --with . python - <<'PY'
          import agent_runtime
          import agent_runtime_conformance

          assert agent_runtime.AgentLoop.__name__ == "AgentLoop"
          assert agent_runtime_conformance.ConformanceRunner.__name__ == "ConformanceRunner"
          PY

      - name: Check JSON contracts
        working-directory: sdks/python
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path

          from jsonschema import Draft202012Validator

          for root in ["../../spec/v0", "../../conformance/cases"]:
              for path in sorted(Path(root).glob("*.json")):
                  data = json.loads(path.read_text())
                  if path.name.endswith(".schema.json"):
                      Draft202012Validator.check_schema(data)

          print("json ok")
          PY

      - name: Lint
        working-directory: sdks/python
        run: uv run ruff check .

      - name: Check formatting
        working-directory: sdks/python
        run: uv run ruff format --check .

      - name: Type-check
        working-directory: sdks/python
        run: uv run pyright

      - name: Run conformance CLI
        working-directory: sdks/python
        run: uv run agent-runtime-conformance ../../conformance/cases

      - name: Test
        working-directory: sdks/python
        run: uv run pytest -q -p no:cacheprovider
