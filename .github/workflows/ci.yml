name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality, contracts, and distributions
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      mysql:
        image: mysql:8.4.10@sha256:c592c15aaf4a1961e15d82eb31ea5987dda862d1c4b1e93424438c0e91dc1f8d
        env:
          MYSQL_DATABASE: jharness
          MYSQL_ROOT_HOST: "%"
          MYSQL_ROOT_PASSWORD: jharness-test-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -pjharness-test-password --silent"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 60
      redis:
        image: redis:8.4.4@sha256:c44528447fa07ed62bdb0c1944cba54f8cad6a4e4a49ada9d4843b5b07d03227
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 60

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked workspace
        run: uv sync --locked

      - name: Verify release metadata
        run: uv run python scripts/verify_release.py

      - name: Validate contracts, cases, and documentation
        run: uv run python scripts/validate_spec.py

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type-check
        run: uv run pyright

      - name: Test with branch coverage
        env:
          COVERAGE_FILE: ${{ runner.temp }}/.coverage
          JHARNESS_TEST_MYSQL_URL: mysql://root:jharness-test-password@127.0.0.1:3306/jharness
          JHARNESS_TEST_REDIS_URL: redis://127.0.0.1:6379/0
        run: >-
          uv run pytest
          -q
          -p no:cacheprovider
          --cov
          --cov-report=term-missing:skip-covered

      - name: Preserve tools coverage gate
        env:
          COVERAGE_FILE: ${{ runner.temp }}/.coverage-tools
        run: >-
          uv run pytest
          -q
          -p no:cacheprovider
          tests/tools
          --cov=jharness.tools
          --cov-report=term-missing:skip-covered
          --cov-fail-under=100

      - name: Run runtime smoke benchmark
        run: uv run python benchmarks/runtime_smoke.py

      - name: Build all distributions
        run: uv build --all-packages --out-dir "${{ runner.temp }}/dist"

      - name: Verify distribution set and isolated imports
        shell: bash
        run: |
          uv run twine check "${RUNNER_TEMP}"/dist/*
          uv run python scripts/verify_distribution.py "${RUNNER_TEMP}/dist"
          uv venv "${RUNNER_TEMP}/smoke"
          uv pip install --python "${RUNNER_TEMP}/smoke/bin/python" "${RUNNER_TEMP}"/dist/*.whl
          "${RUNNER_TEMP}/smoke/bin/python" -I -c "import importlib.util; assert importlib.util.find_spec('pymysql') is None; assert importlib.util.find_spec('redis') is None; from jharness.kernel import Runtime; from jharness.models.openai import OpenAIChatCompletionsModel; from jharness.repository import MemoryRunRepository, MySQLRunRepository, RedisRunRepository, SQLiteRunRepository; from jharness.toolkit import ToolRegistry; from jharness.tools import ReadTool; assert Runtime and OpenAIChatCompletionsModel and MemoryRunRepository and MySQLRunRepository and RedisRunRepository and SQLiteRunRepository and ToolRegistry and ReadTool"
          repository_wheels=("${RUNNER_TEMP}"/dist/jharness_repository-*.whl)
          test "${#repository_wheels[@]}" -eq 1
          uv pip install --python "${RUNNER_TEMP}/smoke/bin/python" "${repository_wheels[0]}[mysql,redis]"
          "${RUNNER_TEMP}/smoke/bin/python" -I -c "import pymysql, redis; assert pymysql and redis"

  runtime:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked workspace
        run: uv sync --locked

      - name: Prefer Git Bash on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value 'C:\Program Files\Git\bin'

      - name: Verify Bash prerequisite
        run: uv run python -c "import shutil; assert shutil.which('bash') is not None"

      - name: Test complete runtime
        run: uv run pytest -q -p no:cacheprovider

      - name: Run runtime smoke benchmark
        run: uv run python benchmarks/runtime_smoke.py
