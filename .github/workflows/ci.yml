name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python workspace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --locked

      - name: Smoke test package CLI
        run: |
          uv run conformance --help
          uv run python - <<'PY'
          import kernel
          import conformance

          assert kernel.AgentLoop.__name__ == "AgentLoop"
          assert conformance.ConformanceRunner.__name__ == "ConformanceRunner"
          PY

      - name: Check JSON contracts
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path

          from jsonschema import Draft202012Validator

          for root in ["contracts/v0", "conformance/cases"]:
              for path in sorted(Path(root).glob("*.json")):
                  data = json.loads(path.read_text())
                  if path.name.endswith(".schema.json"):
                      Draft202012Validator.check_schema(data)

          print("json ok")
          PY

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type-check
        run: uv run pyright

      - name: Run conformance CLI
        run: uv run conformance conformance/cases --spec-dir contracts/v0

      - name: Run examples
        run: |
          uv run python python/packages/kernel/examples/basic_tool_loop.py
          uv run python python/packages/kernel/examples/pause_resume_trace.py

      - name: Test
        run: uv run pytest -q -p no:cacheprovider
