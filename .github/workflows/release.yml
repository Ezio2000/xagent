name: Specification Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: spec-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate released specification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install locked validation dependencies
        run: uv sync --locked

      - name: Verify tag and changelog
        run: uv run python scripts/verify_release.py --tag "$GITHUB_REF_NAME"

      - name: Run complete specification gate
        shell: bash
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright
          uv run python scripts/validate_spec.py

      - name: Create immutable specification release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --verify-tag
          --generate-notes
          --title "JHarness Specification $GITHUB_REF_NAME"
