name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing immutable release tag to continue
        required: true
        type: string
      source_run_id:
        description: Release run containing the verified coordinated artifact set
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
  ARTIFACT_NAME: jharness-set-${{ inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Verify and build all distributions once
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked workspace
        if: github.event_name == 'push'
        run: uv sync --locked

      - name: Start repository integration services
        if: github.event_name == 'push'
        shell: bash
        run: |
          docker run --name jharness-ci-mysql --detach --publish 3306:3306 \
            --env MYSQL_ROOT_PASSWORD=jharness-test-password \
            --env MYSQL_ROOT_HOST=% \
            --env MYSQL_DATABASE=jharness \
            --health-cmd='mysqladmin ping -h localhost -pjharness-test-password --silent' \
            --health-interval=2s --health-timeout=2s --health-retries=60 \
            mysql:8.4.10@sha256:c592c15aaf4a1961e15d82eb31ea5987dda862d1c4b1e93424438c0e91dc1f8d
          docker run --name jharness-ci-redis --detach --publish 6379:6379 \
            --health-cmd='redis-cli ping' \
            --health-interval=2s --health-timeout=2s --health-retries=60 \
            redis:8.4.4@sha256:c44528447fa07ed62bdb0c1944cba54f8cad6a4e4a49ada9d4843b5b07d03227 \
            redis-server --save '' --appendonly no
          for attempt in {1..60}; do
            mysql_health=$(docker inspect --format '{{.State.Health.Status}}' jharness-ci-mysql)
            redis_health=$(docker inspect --format '{{.State.Health.Status}}' jharness-ci-redis)
            if [[ "$mysql_health" == healthy && "$redis_health" == healthy ]]; then
              exit 0
            fi
            if [[ "$mysql_health" == unhealthy || "$redis_health" == unhealthy ]]; then
              docker logs jharness-ci-mysql
              docker logs jharness-ci-redis
              exit 1
            fi
            sleep 2
          done
          docker logs jharness-ci-mysql
          docker logs jharness-ci-redis
          exit 1

      - name: Verify tag and metadata
        if: github.event_name == 'push'
        run: uv run python scripts/verify_release.py --tag "$RELEASE_TAG"

      - name: Run release quality gate
        if: github.event_name == 'push'
        env:
          COVERAGE_FILE: ${{ runner.temp }}/.coverage
          JHARNESS_TEST_MYSQL_URL: mysql://root:jharness-test-password@127.0.0.1:3306/jharness
          JHARNESS_TEST_REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          uv run python scripts/validate_spec.py
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright
          uv run pytest -q -p no:cacheprovider --cov --cov-report=term-missing:skip-covered
          uv run pytest -q -p no:cacheprovider tests/tools --cov=jharness.tools --cov-fail-under=100
          uv run python benchmarks/runtime_smoke.py

      - name: Build immutable artifact set
        if: github.event_name == 'push'
        run: uv build --all-packages --out-dir dist

      - name: Verify artifacts, imports, and checksums
        if: github.event_name == 'push'
        shell: bash
        run: |
          uv run twine check dist/*
          uv run python scripts/verify_distribution.py dist
          uv venv "${RUNNER_TEMP}/smoke"
          uv pip install --python "${RUNNER_TEMP}/smoke/bin/python" dist/*.whl
          "${RUNNER_TEMP}/smoke/bin/python" -I -c "import importlib.util; assert importlib.util.find_spec('pymysql') is None; assert importlib.util.find_spec('redis') is None; from jharness.kernel import Runtime; from jharness.models.openai import OpenAIChatCompletionsModel; from jharness.repository import MemoryRunRepository, MySQLRunRepository, RedisRunRepository, SQLiteRunRepository; from jharness.toolkit import ToolRegistry; from jharness.tools import ReadTool"
          repository_wheels=(dist/jharness_repository-*.whl)
          test "${#repository_wheels[@]}" -eq 1
          uv pip install --python "${RUNNER_TEMP}/smoke/bin/python" "${repository_wheels[0]}[mysql,redis]"
          "${RUNNER_TEMP}/smoke/bin/python" -I -c "import pymysql, redis; assert pymysql and redis"
          sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS
          sha256sum --check dist/SHA256SUMS
          test "$(find dist -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \) | wc -l)" -eq 10
          test -f dist/SHA256SUMS

      - name: Recover verified artifacts from an earlier release run
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}

      - name: Verify recovered run identity and artifacts
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?$ ]]
          [[ "$SOURCE_RUN_ID" =~ ^[0-9]+$ ]]
          tag_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
          run_sha="$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" --jq .head_sha)"
          run_event="$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" --jq .event)"
          run_path="$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" --jq .path)"
          test "$GITHUB_REF" = "refs/tags/$RELEASE_TAG"
          test "$tag_sha" = "$run_sha"
          test "$run_event" = "push"
          test "$run_path" = ".github/workflows/release.yml"
          test "$(find dist -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \) | wc -l)" -eq 10
          test -f dist/SHA256SUMS
          sha256sum --check dist/SHA256SUMS
          python scripts/verify_release.py --tag "$RELEASE_TAG"
          python scripts/verify_distribution.py dist

      - name: Store verified coordinated artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  publish-testpypi:
    name: Publish ${{ matrix.project }} to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: jharness-kernel
            artifact_prefix: jharness_kernel
          - project: jharness-models
            artifact_prefix: jharness_models
          - project: jharness-repository
            artifact_prefix: jharness_repository
          - project: jharness-toolkit
            artifact_prefix: jharness_toolkit
          - project: jharness-tools
            artifact_prefix: jharness_tools
    environment:
      name: testpypi-${{ matrix.project }}
      url: https://test.pypi.org/p/${{ matrix.project }}
    permissions:
      id-token: write

    steps:
      - name: Download verified artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist

      - name: Verify checksums and stage distributions
        shell: bash
        run: |
          sha256sum --check dist/SHA256SUMS
          mkdir publish
          shopt -s nullglob
          package_files=(
            dist/${{ matrix.artifact_prefix }}-*.whl
            dist/${{ matrix.artifact_prefix }}-*.tar.gz
          )
          test "${#package_files[@]}" -eq 2
          cp "${package_files[@]}" publish/
          test "$(find publish -maxdepth 1 -type f | wc -l)" -eq 2

      - name: Publish with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: publish/
          skip-existing: ${{ github.event_name == 'workflow_dispatch' }}
          attestations: false

  verify-testpypi:
    name: Verify coordinated TestPyPI installation
    needs: publish-testpypi
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out smoke examples
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install from TestPyPI and run smoke examples
        run: python scripts/verify_testpypi.py "${RELEASE_TAG#v}"

  publish-pypi:
    name: Publish ${{ matrix.project }} to PyPI
    needs: verify-testpypi
    if: always() && needs.verify-testpypi.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: jharness-kernel
            artifact_prefix: jharness_kernel
          - project: jharness-models
            artifact_prefix: jharness_models
          - project: jharness-repository
            artifact_prefix: jharness_repository
          - project: jharness-toolkit
            artifact_prefix: jharness_toolkit
          - project: jharness-tools
            artifact_prefix: jharness_tools
    environment:
      name: pypi-${{ matrix.project }}
      url: https://pypi.org/p/${{ matrix.project }}
    permissions:
      id-token: write

    steps:
      - name: Download the same verified artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist

      - name: Verify checksums and stage distributions
        shell: bash
        run: |
          sha256sum --check dist/SHA256SUMS
          mkdir publish
          shopt -s nullglob
          package_files=(
            dist/${{ matrix.artifact_prefix }}-*.whl
            dist/${{ matrix.artifact_prefix }}-*.tar.gz
          )
          test "${#package_files[@]}" -eq 2
          cp "${package_files[@]}" publish/
          test "$(find publish -maxdepth 1 -type f | wc -l)" -eq 2

      - name: Publish with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: publish/
          skip-existing: ${{ github.event_name == 'workflow_dispatch' }}

  verify-pypi:
    name: Verify coordinated PyPI installation
    needs: publish-pypi
    if: always() && needs.publish-pypi.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install and import from PyPI
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          for attempt in {1..12}; do
            if uv run --no-project --isolated --refresh \
              --with "jharness-kernel==$version" \
              --with "jharness-toolkit==$version" \
              --with "jharness-models==$version" \
              --with "jharness-repository==$version" \
              --with "jharness-tools==$version" \
              python -I -c \
              "from jharness.kernel import Runtime; from jharness.models.openai import OpenAIChatCompletionsModel; from jharness.repository import MemoryRunRepository, MySQLRunRepository, RedisRunRepository, SQLiteRunRepository; from jharness.toolkit import ToolRegistry; from jharness.tools import ReadTool"; then
              exit 0
            fi
            if [[ "$attempt" == 12 ]]; then exit 1; fi
            sleep 15
          done

  github-release:
    name: Create GitHub Release
    needs: verify-pypi
    if: always() && needs.verify-pypi.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release files and checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha256sum --check dist/SHA256SUMS
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
            exit 0
          fi
          prerelease=()
          version="${RELEASE_TAG#v}"
          if [[ "$version" =~ (a|b|rc)[0-9]+ ]]; then prerelease=(--prerelease); fi
          gh release create "$RELEASE_TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "JHarness $RELEASE_TAG" \
            "${prerelease[@]}"
