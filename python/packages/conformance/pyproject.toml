[project]
name = "conformance"
version = "0.1.0"
description = "Conformance runner for model-neutral runtime implementations"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "xagent contributors" }]
dependencies = [
  "jsonschema>=4.23.0",
  "kernel",
  "referencing>=0.35.0",
]

[project.scripts]
conformance = "conformance.runner:main"

[tool.uv.sources]
kernel = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/conformance"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
